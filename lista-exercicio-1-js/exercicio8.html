<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de área</title>
</head>
<body>
     <script>
    let altura = prompt(" Digite a altura ")
    let largura = prompt(" Digite a largura ")

    let retangulo = largura * altura

    alert(" O resultado do retângulo é: " + retangulo)


     </script>


</body>
</html>
